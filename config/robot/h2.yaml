robot_xml_path: "asset/robot/h2_description/H2.xml"
verbose: True
render_debug: True
keypoints_path: "output_data/keypoints/h2/body_check_001__A548_M_from_g1_keypoints.pkl"

# format: {joint_name: [low_range_offset, high_range_offset]}, degrees
joints_limit_offset_degrees:
  knee_joint: [10.0, 0.0]
  elbow_joint: [20.0, 0.0]

# bending offset for knee angle, degrees
knee_angle_offset_degrees: 15.0

robot_links:
  left_hip: [hips_sphere, left_hip_roll_link]
  left_thigh: [left_hip_roll_link, left_knee_link]
  left_calf: [left_knee_link, left_ankle_roll_link]

  right_hip: [hips_sphere, right_hip_roll_link]
  right_thigh: [right_hip_roll_link, right_knee_link]
  right_calf: [right_knee_link, right_ankle_roll_link]

  neck: [hips_sphere, neck_sphere]
  head: [neck_sphere, head_yaw_link]

  left_shoulder: [neck_sphere, left_shoulder_roll_link]
  left_arm: [left_shoulder_roll_link, left_elbow_link]
  left_fore_arm: [left_elbow_link, left_wrist_yaw_link]

  right_shoulder: [neck_sphere, right_shoulder_roll_link]
  right_arm: [right_shoulder_roll_link, right_elbow_link]
  right_fore_arm: [right_elbow_link, right_wrist_yaw_link]

contact_links: [left_foot_end_link, left_toe_link, 
                right_foot_end_link, right_toe_link, 
                left_wrist_yaw_link, right_wrist_yaw_link]


ik_match_table: {
  "hips_mean": ["hips_sphere", 100, 0],  

  "left_hip": ["left_hip_roll_link", 30, 3],
  "left_thigh": ["left_knee_link", 0.0, 3.0],
  "left_calf": ["left_ankle_pitch_link", 30, 3],

  "right_hip": ["right_hip_roll_link", 30, 3],
  "right_thigh": ["right_knee_link", 0.0, 3.0],
  "right_calf": ["right_ankle_pitch_link", 30, 3],

  "head": ["head_yaw_link", 0.0, 3.0],

  "left_shoulder": ["left_shoulder_roll_link", 30, 3],
  "left_arm": ["left_elbow_link", 10.0, 3],
  "left_fore_arm": ["left_wrist_yaw_link", 10, 1],

  "right_shoulder": ["right_shoulder_roll_link", 30, 3],
  "right_arm": ["right_elbow_link", 10.0, 3],
  "right_fore_arm": ["right_wrist_yaw_link", 10, 1]

}

contact_vel_calculate_window: 6
contact_vel_threshold: 0.5
contact_height_threshold: 0.025
contact_height_lpf_alpha: 0.2
contact_pos_fixed_factor: 15.0

key_frame_config:
  hips_mean:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  left_up_leg:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  left_leg:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  left_foot:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  right_up_leg:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  right_leg:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  right_foot:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  shoulder_mean:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  left_arm:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [0.0, 1.0, 0.0]
      z: [-1.0, 0.0, 0.0]
  left_fore_arm:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [1.0, 0.0, 0.0]
      y: [0.0, 1.0, 0.0]
      z: [0.0, 0.0, 1.0]
  left_hand:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [1.0, 0.0, 0.0]
      y: [0.0, 1.0, 0.0]
      z: [0.0, 0.0, 1.0]
  right_arm:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [0.0, -1.0, 0.0]
      z: [1.0, 0.0, 0.0]
  right_fore_arm:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [-1.0, 0.0, 0.0]
      y: [0.0, -1.0, 0.0]
      z: [0.0, 0.0, 1.0]
  right_hand:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [-1.0, 0.0, 0.0]
      y: [0.0, -1.0, 0.0]
      z: [0.0, 0.0, 1.0]
  head:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]

  