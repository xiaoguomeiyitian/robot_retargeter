robot_xml_path: "asset/robot/noetix_N2/mjcf/n2_18dof.xml"
verbose: True
render_debug: True
keypoints_path: "output_data/keypoints/noetix_n2/body_check_001__A548_M_from_g1_keypoints.pkl"

# format: {joint_name: [low_range_offset, high_range_offset]}, degrees
joints_limit_offset_degrees:
  knee_joint: [10.0, 0.0]
  elbow_joint: [10.0, 0.0]

# bending offset for knee angle, degrees
knee_angle_offset_degrees: 15.0

robot_links:
  left_hip: [hips_sphere, L_leg_hip_pitch_link]
  left_thigh: [L_leg_hip_pitch_link, L_leg_knee_link]
  left_calf: [L_leg_knee_link, L_leg_ankle_link]

  right_hip: [hips_sphere, R_leg_hip_pitch_link]
  right_thigh: [R_leg_hip_pitch_link, R_leg_knee_link]
  right_calf: [R_leg_knee_link, R_leg_ankle_link]

  neck: [hips_sphere, neck_sphere]
  head: [neck_sphere, head_sphere]

  left_shoulder: [neck_sphere, L_arm_shoulder_roll_Link]
  left_arm: [L_arm_shoulder_roll_Link, L_arm_elbow_Link]
  left_fore_arm: [L_arm_elbow_Link, left_hand]

  right_shoulder: [neck_sphere, R_arm_shoulder_roll_Link]
  right_arm: [R_arm_shoulder_roll_Link, R_arm_elbow_Link]
  right_fore_arm: [R_arm_elbow_Link, right_hand]

contact_links: [left_foot_end_link, left_toe_link, 
                right_foot_end_link, right_toe_link, 
                left_hand, right_hand]

contact_vel_calculate_window: 6
contact_vel_threshold: 0.5
contact_height_threshold: 0.025
contact_height_lpf_alpha: 0.15
contact_pos_fixed_factor: 15.0

ik_match_table: {
  "hips_mean": ["hips_sphere", 100, 0],  

  "left_hip": ["L_leg_hip_pitch_link", 30, 3],
  "left_thigh": ["L_leg_knee_link", 0.0, 3.0],
  "left_calf": ["L_leg_ankle_link", 30, 3],

  "right_hip": ["R_leg_hip_pitch_link", 30, 3],
  "right_thigh": ["R_leg_knee_link", 0.0, 3.0],
  "right_calf": ["R_leg_ankle_link", 30, 3],

  "left_shoulder": ["L_arm_shoulder_roll_Link", 30, 3],
  "left_arm": ["L_arm_elbow_Link", 10.0, 3.0],

  "right_shoulder": ["R_arm_shoulder_roll_Link", 30, 3],
  "right_arm": ["R_arm_elbow_Link", 10.0, 3.0],

}

key_frame_config:
  hips_mean:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  left_up_leg:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  left_leg:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  left_foot:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  right_up_leg:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  right_leg:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  right_foot:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  shoulder_mean:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]
  left_arm:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [0.0, 1.0, 0.0]
      z: [-1.0, 0.0, 0.0]
  left_fore_arm:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [0.0, 1.0, 0.0]
      z: [-1.0, 0.0, 0.0]
  left_hand:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [0.0, 1.0, 0.0]
      z: [-1.0, 0.0, 0.0]
  right_arm:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [0.0, -1.0, 0.0]
      z: [1.0, 0.0, 0.0]
  right_fore_arm:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [0.0, -1.0, 0.0]
      z: [1.0, 0.0, 0.0]
  right_hand:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [0.0, -1.0, 0.0]
      z: [1.0, 0.0, 0.0]
  head:
    offset_deg_xyz: [0.0, 0.0, 0.0]
    axis_map_cols:
      x: [0.0, 0.0, 1.0]
      y: [1.0, 0.0, 0.0]
      z: [0.0, 1.0, 0.0]

